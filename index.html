<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:#FEFAF6;color:#1A0E14;-webkit-font-smoothing:antialiased}
::selection{background:#F8E8DE;color:#7C2D43}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:#E8D8D0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#7C2D43;cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input,select,textarea{font-family:'Inter',sans-serif}
button{font-family:'Inter',sans-serif;cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f1f1f1}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

/* ---- tokens ---- */
const T={rose:'#7C2D43',roseDark:'#5C1D30',roseMid:'#A8425A',rosePale:'#F8E8DE',roseLight:'#FDF5F2',cream:'#FEFAF6',gold:'#C98E4F',goldLight:'#F5E9D5',sage:'#8FA15C',sageLight:'#EFF5E4',purple:'#6E5A9C',purpleLight:'#F0EDF9',ink:'#1A0E14',inkMid:'#4A3040',inkLight:'#8A7080',border:'#E8D8D0',white:'#FFFFFF',shadow:'rgba(124,45,67,0.08)',shadowMd:'rgba(124,45,67,0.14)'};

/* ---- helpers ---- */
function todayISO(){return new Date().toISOString().slice(0,10)}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function daysBetween(d1,d2){return Math.floor((d2-d1)/86400000)}
function fmtDate(iso){return new Date(iso+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function calcBMI(w,h){const wn=parseFloat(w),hn=parseFloat(h);if(!wn||!hn)return null;return +((wn/((hn/100)**2)).toFixed(1))}
function bmiCat(b){if(!b)return'—';if(b<18.5)return'Underweight';if(b<25)return'Normal';if(b<30)return'Overweight';return'Obese'}
function calcWHR(w,h){const wn=parseFloat(w),hn=parseFloat(h);if(!wn||!hn)return null;return +((wn/hn).toFixed(2))}
function whrCat(r){if(!r)return'—';if(r<0.8)return'Low Risk';if(r<=0.85)return'Moderate Risk';return'High Risk'}

const PHASE_META={
  menstrual:{label:'Menstrual',tagline:'Rest & restore',color:'#A8425A'},
  follicular:{label:'Follicular',tagline:'Rise & build',color:'#C98E4F'},
  ovulatory:{label:'Ovulatory',tagline:'Peak energy',color:'#8FA15C'},
  luteal:{label:'Luteal',tagline:'Slow & ground',color:'#6E5A9C'},
};

function phaseBounds(len){const l=len||28,ov=Math.round(l/2),me=Math.min(7,Math.max(3,Math.round(l*.18))),fe=Math.max(me+1,ov-2),oe=Math.min(l-1,ov+2);return{len:l,me,fe,oe}}
function phaseForDay(day,len){const{me,fe,oe}=phaseBounds(len);if(day<=me)return'menstrual';if(day<=fe)return'follicular';if(day<=oe)return'ovulatory';return'luteal'}
function getCycleInfo(last,len,dateISO){if(!last)return{day:null,phase:null};const l=len||28,diff=daysBetween(new Date(last+'T00:00:00'),new Date((dateISO||todayISO())+'T00:00:00')),day=((diff%l)+l)%l+1,phase=phaseForDay(day,l);return{day,phase,...phaseBounds(l)}}

/* ---- local storage ---- */
function useLS(key,init){
  const[state,set]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init}catch{return init}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(state))}catch{}},[key,state]);
  return[state,set];
}

/* ---- shared UI ---- */
const Card=({children,style={}})=>(
  <div style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:'24px 28px',boxShadow:`0 2px 14px ${T.shadow}`,...style}}>{children}</div>
);
const Badge=({label,color=T.rose,bg=T.rosePale})=>(
  <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color,background:bg}}>{label}</span>
);
const Input=({label,value,onChange,type='text',placeholder,min,max})=>(
  <div style={{marginBottom:20}}>
    <label style={{display:'block',fontSize:12,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>{label}</label>
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} max={max}
      style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${T.border}`,borderRadius:10,fontSize:15,color:T.ink,background:T.cream,outline:'none',boxSizing:'border-box'}}
      onFocus={e=>e.target.style.borderColor=T.rose} onBlur={e=>e.target.style.borderColor=T.border}/>
  </div>
);
const BackBtn=({onClick})=>(
  <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:6,background:'none',border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 16px',cursor:'pointer',color:T.inkMid,fontSize:13,fontWeight:500,marginBottom:28}}>← Back</button>
);
const SectionHead=({title,subtitle,accent=T.rose})=>(
  <div style={{marginBottom:32}}>
    <div style={{width:36,height:3,background:accent,borderRadius:2,marginBottom:12}}/>
    <h2 style={{fontFamily:'Playfair Display,serif',fontSize:30,fontWeight:700,color:T.ink,margin:0}}>{title}</h2>
    {subtitle&&<p style={{color:T.inkLight,marginTop:6,fontSize:15,margin:'6px 0 0'}}>{subtitle}</p>}
  </div>
);

/* ---- RECIPES ---- */
const RECIPES=[
  {id:'r1',name:'Iron-Boost Beetroot & Spinach Poha',meal:'breakfast',phase:['menstrual'],time:15,cal:290,tags:['iron-rich','warming'],ing:['poha (flattened rice)','beetroot','spinach','onion','mustard seeds','peanuts','lemon'],
    steps:['Rinse 1 cup of poha under water and set aside for 5 minutes to soften.','Grate 1 small beetroot and roughly chop a large handful of spinach leaves.','Heat 1 tablespoon oil in a pan on medium heat. Add mustard seeds and wait for them to splutter.','Add finely chopped onion and cook until soft and golden, about 3 minutes.','Add the grated beetroot and chopped spinach. Cook for 4 minutes, stirring occasionally.','Add the softened poha and peanuts. Mix everything well, season with salt to taste.','Squeeze half a lemon over the top, mix once more and serve warm.'],
    why:'Beetroot and spinach replace iron lost during your period. Peanuts add protein to keep you full. This warm dish is easy on digestion during menstruation.'},
  {id:'r2',name:'Warm Cinnamon Oats with Banana',meal:'breakfast',phase:['menstrual'],time:10,cal:260,tags:['warming','magnesium-rich'],ing:['oats','banana','milk','cinnamon','honey','walnuts'],
    steps:['Pour 1 cup of milk (dairy or plant-based) into a small saucepan and bring to a gentle simmer.','Add half a cup of rolled oats and stir well. Cook on low heat for 5 minutes, stirring every minute.','Mash half a ripe banana with a fork and stir it into the oats.','Add a good pinch of cinnamon and stir everything together.','Pour into a bowl, top with a small handful of chopped walnuts and a drizzle of honey.','Serve immediately while warm.'],
    why:'Banana provides magnesium which helps relax the uterine muscles and ease cramping. Cinnamon steadies blood sugar. The warmth of this dish is soothing during menstruation.'},
  {id:'r3',name:'Golden Turmeric Quinoa Porridge',meal:'breakfast',phase:['follicular','any'],time:20,cal:310,tags:['anti-inflammatory','protein-rich'],ing:['quinoa','milk','turmeric','ginger','honey','almonds'],
    steps:['Rinse half a cup of quinoa under cold water using a fine strainer.','Add quinoa and 1 cup of milk to a small saucepan over medium heat.','Grate a small piece of fresh ginger (about half a teaspoon) and add to the pan along with a pinch of turmeric.','Bring to a gentle boil, then reduce heat to low. Stir frequently for 15 minutes until the quinoa is soft and the mixture is creamy.','Pour into a bowl. Scatter slivered almonds on top and drizzle with a little honey.','Eat while warm.'],
    why:'Quinoa is a complete protein source, supporting the energy build-up of your follicular phase. Turmeric and ginger are powerful anti-inflammatory ingredients that support hormone balance.'},
  {id:'r4',name:'Avocado & Egg Power Toast',meal:'breakfast',phase:['ovulatory','any'],time:12,cal:340,tags:['protein-rich'],ing:['whole grain bread','avocado','eggs','chilli flakes','lemon','tomato'],
    steps:['Toast 2 slices of whole grain bread until golden and crisp.','While bread toasts, cut an avocado in half, remove the stone and scoop the flesh into a bowl.','Add a squeeze of lemon juice, a pinch of chilli flakes and a pinch of salt to the avocado. Mash with a fork to a rough, chunky paste.','Fry or poach one egg to your liking. For a poached egg: bring a small pan of water to a gentle simmer, add a splash of vinegar, swirl the water and slide in the cracked egg. Cook 3 minutes for a runny yolk.','Spread the mashed avocado generously over both toast slices.','Top with the egg and sliced fresh tomato. Add extra chilli flakes if desired.'],
    why:'This combination of healthy fats, protein and complex carbohydrates gives sustained energy that matches your naturally high energy levels around ovulation.'},
  {id:'r5',name:'Sweet Potato & Almond Butter Bowl',meal:'breakfast',phase:['luteal'],time:20,cal:320,tags:['magnesium-rich','warming'],ing:['sweet potato','almond butter','cinnamon','pumpkin seeds','honey'],
    steps:['Peel and cube one medium sweet potato into small pieces.','Place in a steamer basket over boiling water, cover and steam for 15 minutes until completely soft. Alternatively, microwave on high for 5 minutes.','Transfer the cooked sweet potato to a bowl and mash lightly with a fork — leave some texture.','Add one tablespoon of almond butter and a generous pinch of cinnamon. Stir everything together gently.','Scatter a tablespoon of pumpkin seeds over the top and drizzle with a little honey.','Serve warm as a comforting breakfast.'],
    why:'Sweet potato provides complex carbohydrates that steady blood sugar and reduce luteal phase cravings. Almond butter and pumpkin seeds deliver magnesium, which eases PMS symptoms and supports mood.'},
  {id:'r6',name:'Comforting Lentil & Spinach Dal',meal:'lunch',phase:['menstrual'],time:30,cal:420,tags:['iron-rich','protein-rich','warming'],ing:['red lentils','spinach','brown rice','ginger','garlic','turmeric','cumin','ghee'],
    steps:['Rinse 1 cup of red lentils under cold water until the water runs clear.','Place lentils in a pan with 3 cups of water and a half teaspoon of turmeric. Bring to a boil then simmer on low heat for 15 minutes, stirring occasionally, until lentils are completely soft and beginning to dissolve.','Meanwhile, cook brown rice according to packet directions (usually 25 minutes with double the water).','In a separate small pan, heat 1 tablespoon of ghee over medium heat. Add half a teaspoon of cumin seeds and let them sizzle for 30 seconds.','Add 2 cloves of finely chopped garlic and a thumb-sized piece of grated ginger. Cook for 1 minute until fragrant.','Pour this spiced ghee mixture into the cooked lentils and stir well.','Add 2 large handfuls of roughly chopped spinach to the dal. Stir and cook for 3 minutes until wilted.','Season with salt, serve the dal over brown rice and eat hot.'],
    why:'Red lentils and spinach are among the best plant sources of iron, helping replenish what is lost during menstruation. Ghee helps the body absorb the iron and soothes the digestive system.'},
  {id:'r7',name:'Quinoa Veggie Power Bowl',meal:'lunch',phase:['follicular','any'],time:25,cal:410,tags:['protein-rich','high-fiber'],ing:['quinoa','broccoli','chickpeas','carrot','tahini','lemon'],
    steps:['Rinse three-quarters of a cup of quinoa under cold water.','Cook quinoa in one and a half cups of water: bring to boil, cover, reduce heat to low and cook for 15 minutes until water is absorbed. Fluff with a fork.','Cut broccoli into small florets and slice one carrot into thin rounds. Steam together for 5 minutes until just tender but still bright green.','Warm the chickpeas in a small pan with a pinch of cumin and salt for 3 minutes.','To make the dressing: mix 2 tablespoons of tahini with the juice of half a lemon, 1 tablespoon of water and a pinch of salt. Stir until smooth and pourable.','Assemble the bowl: place quinoa as a base, top with steamed vegetables and chickpeas.','Drizzle the tahini dressing generously over everything and serve.'],
    why:'This bowl delivers balanced protein and fibre that supports your rising oestrogen and builds steady energy through the follicular phase. Chickpeas also contain B vitamins important for hormone production.'},
  {id:'r8',name:'Mediterranean Salmon & Couscous',meal:'lunch',phase:['ovulatory','any'],time:25,cal:460,tags:['protein-rich','anti-inflammatory'],ing:['salmon fillet','couscous','cucumber','tomato','olive oil','lemon','feta cheese'],
    steps:['Place one cup of couscous in a heatproof bowl. Pour one cup of boiling water over it and add a pinch of salt and half a tablespoon of olive oil. Cover with a plate and leave for 5 minutes.','Season a salmon fillet on both sides with salt, pepper and a squeeze of lemon.','Heat a pan over medium-high heat with a little olive oil. Place the salmon skin-side down and cook for 4 minutes without moving it. Flip and cook a further 3 minutes.','While salmon cooks, dice half a cucumber and one tomato into small cubes. Crumble a small amount of feta cheese.','Fluff the couscous with a fork to separate all the grains. Add the diced cucumber, tomato and feta. Toss with a drizzle of olive oil and lemon juice.','Serve the salmon over the couscous with a lemon wedge on the side.'],
    why:'Salmon is the richest food source of anti-inflammatory omega-3 fatty acids, which are particularly important during ovulation. The complete protein supports your peak energy phase.'},
  {id:'r9',name:'Sweet Potato Black Bean Bowl',meal:'lunch',phase:['luteal'],time:30,cal:430,tags:['magnesium-rich','high-fiber'],ing:['sweet potato','black beans','avocado','corn','lime','cumin','olive oil'],
    steps:['Preheat your oven to 200°C (400°F).','Peel and cube one large sweet potato into 2cm pieces. Toss with one tablespoon of olive oil, half a teaspoon of cumin and a pinch of salt.','Spread on a baking tray in a single layer and roast for 20 minutes, turning halfway, until golden and soft.','Drain and rinse one tin of black beans. Warm in a small pan with a pinch of cumin and salt for 3 minutes.','Warm the corn (tinned is fine) in the same pan for 2 minutes.','Slice one ripe avocado.','Build your bowl: roasted sweet potato as the base, then black beans, corn and avocado slices on top.','Squeeze a whole lime over everything and add a little extra cumin if desired.'],
    why:'Complex carbohydrates from sweet potato and beans help manage the intense cravings of the luteal phase. Black beans and pumpkin seeds are excellent sources of magnesium which reduces PMS mood symptoms.'},
  {id:'r10',name:'Ginger Turmeric Vegetable Soup',meal:'dinner',phase:['menstrual'],time:25,cal:240,tags:['warming','anti-inflammatory'],ing:['carrot','pumpkin','ginger','turmeric','garlic','vegetable broth','coconut milk'],
    steps:['Peel and roughly chop 2 carrots and a 300g piece of pumpkin or butternut squash into chunks.','Finely chop 3 cloves of garlic and grate a thumb-sized piece of fresh ginger.','Heat a tablespoon of oil in a large pan over medium heat. Add garlic and ginger and cook for 1 minute until fragrant.','Add the chopped carrots and pumpkin. Stir to coat in the garlic and ginger.','Pour in 600ml of vegetable broth. Add half a teaspoon of turmeric. Bring to a boil then simmer for 15 minutes until vegetables are completely soft.','Use a blender or hand blender to blend the soup until completely smooth and silky.','Stir in 3 tablespoons of coconut milk for creaminess. Season with salt. Reheat gently if needed and serve hot.'],
    why:'This soup is deeply warming and soothing during menstruation. Ginger is clinically shown to reduce period pain by blocking prostaglandins. Turmeric reduces inflammation. The warm liquid eases bloating and cramps.'},
  {id:'r11',name:'Khichdi with Ghee',meal:'dinner',phase:['menstrual'],time:30,cal:350,tags:['warming','light'],ing:['white rice','moong dal (split yellow lentils)','ghee','cumin seeds','turmeric','fresh ginger'],
    steps:['Measure half a cup each of rice and moong dal. Rinse together in cold water 3 times until the water runs clear.','Place the rinsed rice and dal in a pressure cooker or large pot with 3 cups of water, half a teaspoon of turmeric and a small piece of grated ginger.','For a pressure cooker: cook on high for 3 whistles then leave to release pressure naturally. For a regular pot: bring to boil, cover and simmer on low for 25 minutes until completely soft and porridge-like. Add more water if needed.','The cooked khichdi should have a soft, thick, almost mushy consistency — this is correct.','In a very small pan, heat 1 tablespoon of ghee over high heat until it shimmers. Add half a teaspoon of cumin seeds and let them sizzle and darken for 30 seconds.','Pour this hot ghee and cumin tempering directly over the khichdi. Season with salt.','Stir gently and serve immediately in a bowl.'],
    why:'Khichdi is the classic Ayurvedic comfort food for menstruation. It is the easiest dish for the body to digest, requiring minimal energy, leaving you with more resources for healing. Ghee nourishes and soothes the gut lining.'},
  {id:'r12',name:'Stir-fried Veggies with Quinoa',meal:'dinner',phase:['follicular','any'],time:20,cal:360,tags:['high-fiber','protein-rich'],ing:['quinoa','zucchini','bell pepper','mushroom','garlic','soy sauce','sesame oil'],
    steps:['Rinse and cook half a cup of quinoa: place in a pan with 1 cup of water, bring to boil, cover and simmer 15 minutes until all water is absorbed.','Slice one zucchini into half-moons, dice one bell pepper, and slice a handful of mushrooms.','Mince 2 cloves of garlic.','Heat 1 tablespoon of oil in a wok or large frying pan over high heat until very hot.','Add the garlic and stir for 30 seconds. Add all the vegetables and stir-fry on high heat for 5 minutes, keeping them moving constantly.','Add 2 tablespoons of soy sauce and a few drops of sesame oil. Toss everything together.','Serve the stir-fried vegetables over the cooked quinoa immediately while hot.'],
    why:'A light, energising meal that matches the building energy of your follicular phase. High-heat cooking preserves the vegetables nutrients while creating satisfying flavour.'},
  {id:'r13',name:'Baked Salmon with Greens',meal:'dinner',phase:['ovulatory','any'],time:25,cal:420,tags:['protein-rich','anti-inflammatory'],ing:['salmon fillet','spinach','kale','garlic','olive oil','lemon'],
    steps:['Preheat oven to 200°C (400°F).','Place the salmon fillet on a baking tray lined with foil or baking paper.','Drizzle with olive oil, season generously with salt and pepper and squeeze half a lemon over the fish.','Bake for 12 to 15 minutes depending on thickness. The salmon should flake easily when pressed with a fork and be opaque throughout.','While salmon bakes, heat a pan over medium heat with a little olive oil.','Add 2 minced garlic cloves and cook for 30 seconds.','Add large handfuls of spinach and kale. Toss and cook for 3 minutes until wilted. Season with salt.','Serve the baked salmon directly over the wilted greens with a lemon wedge.'],
    why:'Salmon is packed with omega-3 fatty acids and high-quality protein that supports peak performance during ovulation. Leafy greens provide iron and folate that support hormone production.'},
  {id:'r14',name:'Comforting Red Lentil Stew',meal:'dinner',phase:['luteal'],time:30,cal:380,tags:['magnesium-rich','warming'],ing:['red lentils','sweet potato','coconut milk','ginger','cumin','spinach','vegetable broth'],
    steps:['Peel and dice one medium sweet potato into small cubes.','Rinse three-quarters of a cup of red lentils.','Grate a thumb-sized piece of fresh ginger.','Heat a tablespoon of oil in a large pan over medium heat. Add half a teaspoon of cumin seeds and let sizzle for 30 seconds.','Add the grated ginger and stir for 30 seconds.','Add the diced sweet potato and rinsed lentils. Stir to combine.','Pour in one tin of coconut milk and 400ml of vegetable broth. Bring to a boil.','Reduce heat to low and simmer uncovered for 20 minutes, stirring occasionally, until lentils are completely soft and the stew is thick.','Stir in 2 large handfuls of spinach. Cook for 2 more minutes until wilted. Season with salt and serve hot.'],
    why:'A grounding, nourishing stew designed to ease the tension of the luteal phase. Lentils and sweet potato provide magnesium which reduces PMS anxiety and supports restful sleep. Coconut milk is calming and anti-inflammatory.'},
  {id:'r15',name:'Date, Almond & Flax Energy Balls',meal:'snack',phase:['any'],time:15,cal:150,tags:['magnesium-rich'],ing:['medjool dates','almonds','ground flaxseed','cocoa powder','desiccated coconut'],
    steps:['Remove the stones from 10 medjool dates.','Place dates and 100g of almonds in a food processor. Blend until the mixture sticks together when pressed between your fingers.','Add 2 tablespoons of ground flaxseed and 1 tablespoon of cocoa powder. Blend again briefly to combine.','If the mixture is too dry, add 1 teaspoon of water. If too sticky, add more almonds.','Spread desiccated coconut on a flat plate.','Roll the mixture into small balls about the size of a large marble using your palms.','Roll each ball in the coconut to coat. Place on a tray and refrigerate for 20 minutes to firm up.','Store in the fridge in an airtight container for up to 1 week.'],
    why:'These require no cooking and provide a natural energy boost for any phase of your cycle. Dates and almonds are rich in magnesium and healthy fats. Flaxseed supports hormone balance throughout the month.'},
  {id:'r16',name:'Dark Chocolate & Walnut Bites',meal:'snack',phase:['luteal'],time:10,cal:170,tags:['magnesium-rich'],ing:['dark chocolate (70%+)','walnuts','sea salt flakes'],
    steps:['Break 100g of dark chocolate (minimum 70% cocoa) into small pieces and place in a heatproof bowl.','Bring a small pan of water to a simmer. Place the bowl over the pan without the bowl touching the water. Stir chocolate until completely melted and smooth.','Alternatively, melt in a microwave in 30-second bursts, stirring between each burst.','Roughly chop 50g of walnuts.','Remove chocolate from heat. Stir in the chopped walnuts.','Spoon small dollops onto a tray lined with baking paper.','Immediately sprinkle a few sea salt flakes over each one.','Leave to set at room temperature for 30 minutes, or in the fridge for 10 minutes.'],
    why:'Dark chocolate is one of the most concentrated food sources of magnesium, which directly reduces PMS tension and mood symptoms. This satisfies the intense chocolate cravings of the luteal phase with real nutritional benefit rather than empty sugar.'},
  {id:'r17',name:'Honey-Roasted Pumpkin Seeds',meal:'snack',phase:['menstrual','follicular'],time:12,cal:140,tags:['iron-rich','magnesium-rich'],ing:['raw pumpkin seeds','honey','cinnamon','sea salt'],
    steps:['Preheat oven to 180°C (350°F) and line a small baking tray with baking paper.','Place half a cup of raw pumpkin seeds in a bowl.','Add 1 teaspoon of honey, a good pinch of cinnamon and a pinch of sea salt. Toss well to coat all the seeds.','Spread in a single layer on the prepared baking tray.','Roast for 8 to 10 minutes, checking at 8 minutes. They should be golden and beginning to pop. Watch carefully as they can burn quickly.','Remove from oven and leave to cool completely on the tray — they will crisp up as they cool.','Store in an airtight jar at room temperature for up to 2 weeks.'],
    why:'Part of the seed cycling protocol for the first half of your cycle. Pumpkin seeds are exceptionally rich in zinc, magnesium and iron. Zinc supports the development of the follicle and the production of progesterone.'},
  {id:'r18',name:'Greek Yogurt Berry Parfait',meal:'snack',phase:['follicular','any'],time:8,cal:220,tags:['protein-rich','light'],ing:['Greek yogurt','mixed berries','ground flaxseed','honey','granola'],
    steps:['Take a tall glass or bowl.','Place 2 tablespoons of granola at the bottom as the first layer.','Add a large spoonful of Greek yogurt (about 4 tablespoons) on top of the granola.','Scatter a small handful of mixed berries over the yogurt.','Sprinkle 1 tablespoon of ground flaxseed over the berries.','Add another layer of yogurt, then berries on top.','Finish with a thin drizzle of honey over everything.','Eat immediately or refrigerate covered for up to 2 hours.'],
    why:'Greek yogurt is rich in protein and probiotics that support the gut-hormone axis. Flaxseed provides lignans that help the body metabolise oestrogen more efficiently as it rises in the follicular phase.'},
];

/* ---- NAV ---- */
const NAV=[{k:'home',l:'Home',i:'🏠'},{k:'tracker',l:'Tracker',i:'📅'},{k:'recipes',l:'Recipes',i:'🥗'},{k:'mealprep',l:'Meal Plan',i:'📋'},{k:'yoga',l:'Yoga',i:'🧘'},{k:'ayurveda',l:'Ayurveda',i:'🌿'},{k:'disorders',l:'Wellness',i:'💙'}];

function Navbar({page,setPage,profile}){
  const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength);
  return(
    <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(254,250,246,0.95)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${T.border}`,padding:'0 16px'}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',height:62,gap:8}}>
        <button onClick={()=>setPage('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:8,marginRight:16,flexShrink:0}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:T.rose,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'white',fontSize:16}}>🌸</span>
          </div>
          <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:18,color:T.rose}}>NariSync</span>
        </button>
        <div style={{display:'flex',gap:2,flex:1,overflowX:'auto',paddingBottom:2}}>
          {NAV.map(n=>(
            <button key={n.k} onClick={()=>setPage(n.k)} style={{background:page===n.k?T.rosePale:'none',border:page===n.k?`1px solid ${T.border}`:'1px solid transparent',borderRadius:10,padding:'6px 12px',cursor:'pointer',color:page===n.k?T.rose:T.inkMid,fontSize:12,fontWeight:page===n.k?600:500,whiteSpace:'nowrap'}}>
              {n.i} {n.l}
            </button>
          ))}
        </div>

/* ---- RECIPE GENERATOR ---- */
function RecipesPage({profile,logs,setLogs,setPage}){
  const today=todayISO();
  const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,today);
  const[ing,setIng]=useState('');
  const[maxTime,setMaxTime]=useState('30');
  const[mealType,setMealType]=useState('any');
  const[results,setResults]=useState([]);
  const[generated,setGenerated]=useState(false);
  const[logged,setLogged]=useState({});

  function score(r){
    const ui=ing.toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    if(ui.length===0) return 10;
    const matches=r.ing.filter(ri=>
      ui.some(u=>ri.toLowerCase().includes(u)||u.includes(ri.toLowerCase().split(' ')[0]))
    ).length;
    if(matches===0) return -1;
    let s=matches*20;
    if(r.phase.includes(phase)||r.phase.includes('any'))s+=10;
    if(mealType!=='any'&&r.meal===mealType)s+=5;
    if(+maxTime&&r.time<=+maxTime)s+=5;
    return s;
  }

  function generate(){
    const scored=RECIPES
      .filter(r=>mealType==='any'||r.meal===mealType)
      .filter(r=>!maxTime||r.time<=+maxTime)
      .map(r=>({...r,score:score(r)}))
      .filter(r=>r.score>0)
      .sort((a,b)=>b.score-a.score)
      .slice(0,3);
    setResults(scored);
    setGenerated(true);
  }

  function logCal(r){
    setLogs(p=>{const dl=p[today]||{};return{...p,[today]:{...dl,calories:(dl.calories||0)+r.cal}}});
    setLogged(p=>({...p,[r.id]:true}));
  }

  return(
    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Recipe Generator" subtitle="Enter your ingredients to get matching recipes with full cooking guides."/>
      {phase&&<div style={{marginBottom:20}}><Badge label={`${PHASE_META[phase].label} Phase — recipes will prioritise ingredients you have`} color={PHASE_META[phase].color} bg={PHASE_META[phase].color+'18'}/></div>}
      <Card style={{marginBottom:24}}>
        <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>What ingredients do you have?</h3>
        <Input label="Available ingredients — separate with commas" value={ing} onChange={e=>setIng(e.target.value)} placeholder="e.g. spinach, lentils, ginger, rice, onion"/>
        <p style={{fontSize:12,color:T.inkLight,margin:'-12px 0 18px',lineHeight:1.5}}>Only recipes containing your listed ingredients will appear. Leave blank to see all recipes for your current phase.</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <Input label="Max time (minutes)" type="number" value={maxTime} onChange={e=>setMaxTime(e.target.value)} placeholder="30" min="5" max="120"/>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Meal Type</label>
            <select value={mealType} onChange={e=>setMealType(e.target.value)} style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${T.border}`,borderRadius:10,fontSize:14,color:T.ink,background:T.cream,outline:'none'}}>
              {['any','breakfast','lunch','dinner','snack'].map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
            </select>
          </div>
        </div>
        <button onClick={generate} style={{width:'100%',padding:13,background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',marginTop:4}}>🔍 Find Matching Recipes</button>
      </Card>

      {generated&&results.length>0&&(
        <div>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:20,color:T.ink,marginBottom:20}}>
            {results.length} recipe{results.length>1?'s':''} matched your ingredients
          </h3>
          <div style={{display:'flex',flexDirection:'column',gap:28}}>
            {results.map(r=>(

      )}
    </div>
  );
}

/* ---- MEAL PLANNER ---- */
function MealPrepPage({profile,logs,setLogs,setPage}){
  const today=todayISO();
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const[plan,setPlan]=useState(null);
  const[showShop,setShowShop]=useState(false);
  const[loggedMeals,setLoggedMeals]=useState({});
  function generate(){
    const p={};
    days.forEach((d,i)=>{
      const iso=addDays(today,i);
      const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,iso);
      p[d]={date:iso,phase};
      ['breakfast','lunch','dinner','snack'].forEach(mt=>{
        const pool=RECIPES.filter(r=>r.meal===mt&&(r.phase.includes(phase)||r.phase.includes('any')||!phase));
        const fb=RECIPES.filter(r=>r.meal===mt);
        const src=pool.length>0?pool:fb;
        p[d][mt]=src[Math.floor(Math.random()*src.length)];
      });
    });
    setPlan(p);setShowShop(false);setLoggedMeals({});
  }
  function buildList(){
    const all={};
    Object.values(plan).forEach(d=>{
      ['breakfast','lunch','dinner','snack'].forEach(mt=>{
        if(d[mt]?.ing)d[mt].ing.forEach(i=>{const k=i.toLowerCase().trim();all[k]=(all[k]||0)+1;});
      });
    });
    const cats={'Grains & Pulses':[],'Vegetables':[],'Fruits':[],'Protein & Dairy':[],'Nuts & Seeds':[],'Spices & Condiments':[],'Other':[]};
    const gk=['rice','oat','quinoa','poha','flour','bread','lentil','dal','couscous','chickpea','bean'];
    const vk=['spinach','kale','broccoli','carrot','onion','garlic','ginger','beetroot','mushroom','zucchini','pepper','tomato','cucumber','potato','cauliflower','corn','pumpkin'];
    const fk=['banana','berries','lemon','lime','date','avocado'];
    const pk=['egg','tofu','paneer','yogurt','milk','cheese','salmon','feta','chocolate'];
    const nk=['almond','walnut','peanut','seed','flax','sesame','coconut','cashew'];
    const sk=['cinnamon','cumin','turmeric','garam','mustard','cardamom','paprika','salt','honey','oil','ghee','soy','tahini','chilli'];
    Object.keys(all).forEach(i=>{
      if(gk.some(k=>i.includes(k)))cats['Grains & Pulses'].push(i);
      else if(vk.some(k=>i.includes(k)))cats['Vegetables'].push(i);
      else if(fk.some(k=>i.includes(k)))cats['Fruits'].push(i);
      else if(pk.some(k=>i.includes(k)))cats['Protein & Dairy'].push(i);
      else if(nk.some(k=>i.includes(k)))cats['Nuts & Seeds'].push(i);
      else if(sk.some(k=>i.includes(k)))cats['Spices & Condiments'].push(i);
      else cats['Other'].push(i);
    });
    return cats;
  }
  function logMeal(dayKey,mt,recipe){
    setLoggedMeals(p=>({...p,[`${dayKey}-${mt}`]:true}));
    const iso=plan[dayKey].date;
    setLogs(p=>{const dl=p[iso]||{};return{...p,[iso]:{...dl,calories:(dl.calories||0)+recipe.cal}}});
  }
  const ShopItem=({item})=>{const[chk,setChk]=useState(false);return(<li onClick={()=>setChk(c=>!c)} style={{padding:'7px 0',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}><div style={{width:16,height:16,borderRadius:4,border:`2px solid ${chk?T.sage:T.border}`,background:chk?T.sage:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{chk&&<span style={{color:'white',fontSize:9,fontWeight:700}}>✓</span>}</div><span style={{fontSize:13,color:chk?T.inkLight:T.inkMid,textDecoration:chk?'line-through':'none',textTransform:'capitalize'}}>{item}</span></li>);};
  const list=plan&&showShop?buildList():null;
  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Weekly Meal Planner" subtitle="A phase-aligned meal plan for the next 7 days with a smart shopping list." accent={T.sage}/>
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
        <button onClick={generate} style={{padding:'12px 24px',background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer'}}>✨ Generate This Week's Plan</button>
        {plan&&<button onClick={()=>setShowShop(!showShop)} style={{padding:'12px 24px',background:showShop?T.sage:T.sageLight,color:showShop?'white':T.sage,border:`1.5px solid ${T.sage}40`,borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer'}}>🛒 {showShop?'Show Meal Plan':'Shopping List'}</button>}
      </div>
      {plan&&!showShop&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {days.map(dk=>{
            const d=plan[dk];const isToday=d.date===today;const pm=d.phase?PHASE_META[d.phase]:null;
            return(
              <Card key={dk} style={{borderLeft:`4px solid ${pm?pm.color:T.border}`,background:isToday?T.roseLight:T.white}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div><span style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:700,color:T.ink,marginRight:10}}>{dk}</span><span style={{fontSize:11,color:T.inkLight}}>{fmtDate(d.date)}</span>{isToday&&<Badge label="Today" color={T.rose} bg={T.rosePale}/>}</div>
                  {pm&&<Badge label={pm.label} color={pm.color} bg={pm.color+'18'}/>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
                  {['breakfast','lunch','dinner','snack'].map(mt=>{
                    const r=d[mt];const lk=`${dk}-${mt}`;const isL=loggedMeals[lk];
                    if(!r)return null;
                    return(
                      <div key={mt} style={{background:isL?T.sageLight:T.cream,borderRadius:10,padding:'11px 13px',border:`1px solid ${isL?T.sage+'40':T.border}`}}>
                        <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:T.gold,marginBottom:4}}>{mt}</div>
                        <div style={{fontSize:12,fontWeight:600,color:T.ink,marginBottom:4,lineHeight:1.3}}>{r.name}</div>
                        <div style={{display:'flex',gap:8,fontSize:10,color:T.inkLight,marginBottom:8}}><span>⏱ {r.time}min</span><span>🔥 {r.cal} kcal</span></div>
                        {isToday&&<button onClick={()=>logMeal(dk,mt,r)} disabled={isL} style={{width:'100%',padding:5,background:isL?T.sage:T.rose,color:'white',border:'none',borderRadius:6,fontWeight:600,fontSize:10,cursor:isL?'default':'pointer'}}>{isL?'✓ Logged':'Log Meal'}</button>}
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:8,fontSize:11,color:T.inkLight}}>Total: <strong style={{color:T.ink}}>{(['breakfast','lunch','dinner','snack'].reduce((a,mt)=>a+(d[mt]?.cal||0),0)).toLocaleString()} kcal</strong></div>
              </Card>
            );
          })}
        </div>
      )}
      {list&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:18}}>
          {Object.entries(list).filter(([,items])=>items.length>0).map(([cat,items])=>(
            <Card key={cat}><h4 style={{fontFamily:'Playfair Display,serif',fontSize:15,color:T.ink,margin:'0 0 12px'}}>{cat}</h4>
            <ul style={{margin:0,padding:0,listStyle:'none'}}>{[...new Set(items)].sort().map(item=><ShopItem key={item} item={item}/>)}</ul></Card>
          ))}
        </div>
      )}
      {!plan&&<Card style={{textAlign:'center',padding:'44px 24px'}}><div style={{fontSize:44,marginBottom:12}}>📋</div><p style={{fontSize:15,color:T.inkLight}}>Generate your personalised weekly plan — meals are chosen to align with your cycle phase each day.</p></Card>}
    </div>
  );
}

  menstrual:{label:'Menstrual',color:'#A8425A',bg:'#FDF0F3',title:'Rest, Release & Restore',intro:'During menstruation, your body is working hard. Favour gentle, restorative poses that ease cramps, release tension in the lower back and pelvis, and encourage circulation without strain.',poses:[

      <SectionHead title="Wellness & Disorders Guide" subtitle="Evidence-based guidance on common menstrual health conditions." accent={T.purple}/>
      {!sel?(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:18}}>
          {DISORDERS.map(d=>(
            <button key={d.id} onClick={()=>{setSel(d);setSecTab('syms')}} style={{textAlign:'left',background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:22,cursor:'pointer',transition:'all 0.2s',boxShadow:`0 2px 10px ${T.shadow}`}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 6px 20px ${T.shadowMd}`}}
              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=`0 2px 10px ${T.shadow}`}}>
              <div style={{fontSize:32,marginBottom:10}}>{d.emoji}</div>
              <h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 4px'}}>{d.full}</h3>
              <div style={{fontSize:11,color:T.inkLight,marginBottom:10,fontStyle:'italic'}}>{d.prev}</div>
              <div style={{fontSize:13,color:T.purple,fontWeight:600,marginTop:10}}>Read full guide →</div>
            </button>
          ))}
        </div>
      ):(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>
            <div style={{fontSize:38}}>{sel.emoji}</div>
            <div><h2 style={{fontFamily:'Playfair Display,serif',fontSize:26,color:T.ink,margin:0}}>{sel.full}</h2><p style={{margin:'4px 0 0',fontSize:12,color:T.inkLight,fontStyle:'italic'}}>{sel.prev}</p></div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:22,flexWrap:'wrap',borderBottom:`1px solid ${T.border}`,paddingBottom:14}}>
            {sections.map(s=><button key={s.k} onClick={()=>setSecTab(s.k)} style={{padding:'7px 16px',borderRadius:10,fontWeight:600,fontSize:12,background:secTab===s.k?T.purple:'none',color:secTab===s.k?'white':T.inkLight,border:`1.5px solid ${secTab===s.k?T.purple:T.border}`,cursor:'pointer'}}>{s.l}</button>)}
          </div>
          <Card style={{borderLeft:`4px solid ${T.purple}`}}>
            {secTab==='syms'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 14px'}}>Signs & Symptoms</h3><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10}}>{sel.syms.map(s=><div key={s} style={{display:'flex',gap:8,padding:'10px 12px',background:T.purpleLight,borderRadius:10}}><span style={{color:T.purple,flexShrink:0}}>◆</span><span style={{fontSize:13,color:T.inkMid}}>{s}</span></div>)}</div></div>}
            {secTab==='causes'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>Causes</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.causes}</p></div>}
            {secTab==='nutrition'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 14px'}}>Nutrition Guidance</h3>{sel.nutrition.map((n,i)=><div key={i} style={{display:'flex',gap:10,padding:'11px 14px',background:T.roseLight,borderRadius:10,marginBottom:8}}><span style={{color:T.rose,fontWeight:800,flexShrink:0}}>{i+1}.</span><span style={{fontSize:13,color:T.inkMid,lineHeight:1.55}}>{n}</span></div>)}</div>}
            {secTab==='exercise'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>Movement & Exercise</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.exercise}</p></div>}
            {secTab==='ayurveda'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>Ayurvedic Approach</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.ayurveda}</p></div>}
            {secTab==='doctor'&&<div><div style={{display:'flex',gap:10,padding:'12px 16px',background:'#FFF3F5',borderRadius:12,border:`1.5px solid ${T.rose}30`,marginBottom:14}}><span style={{fontSize:18}}>⚕️</span><p style={{fontSize:13,color:T.inkMid,margin:0,lineHeight:1.65}}><strong style={{color:T.rose}}>Always consult a qualified healthcare provider.</strong> The information below is educational only and not a substitute for medical advice.</p></div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>When to Seek Medical Advice</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.doctor}</p></div>}
          </Card>
        </div>
      )}
      <div style={{marginTop:28,padding:'14px 18px',background:T.goldLight,borderRadius:12,fontSize:11,color:T.inkLight,lineHeight:1.6}}><strong>Medical disclaimer:</strong> NariSync provides health information for educational purposes only. It is not intended to diagnose, treat, cure or prevent any condition. Always consult a qualified healthcare professional for personal medical advice.</div>
    </div>
  );
}

/* ---- SETTINGS ---- */
function SettingsPage({profile,setProfile,setPage}){
  const[form,setForm]=useState({...profile});
  const[saved,setSaved]=useState(false);
  const bmi=calcBMI(form.weight,form.height);
  const whr=calcWHR(form.waist,form.hip);
  function save(){setProfile({...form});setSaved(true);setTimeout(()=>setSaved(false),2200);}
  const info=getCycleInfo(form.lastPeriod,+form.cycleLength,todayISO());
  const len=+form.cycleLength||28;
  const{me,fe,oe}=info.me!=null?info:{...phaseBounds(len)};
  const phaseBar=[{n:'Menstrual',s:1,e:me,c:T.rose},{n:'Follicular',s:me+1,e:fe,c:T.gold},{n:'Ovulatory',s:fe+1,e:oe,c:T.sage},{n:'Luteal',s:oe+1,e:len,c:T.purple}];
  return(
    <div style={{maxWidth:840,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Your Profile" subtitle="Your health data powers personalised recommendations across all modules."/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <Card>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Basic Info</h3>
          <Input label="Your name" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Priya"/>
          <Input label="Age" type="number" value={form.age||''} onChange={e=>setForm(f=>({...f,age:e.target.value}))} placeholder="25" min="10" max="80"/>
          <Input label="Weight (kg)" type="number" value={form.weight||''} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="60" min="30" max="200"/>
          <Input label="Height (cm)" type="number" value={form.height||''} onChange={e=>setForm(f=>({...f,height:e.target.value}))} placeholder="165" min="100" max="230"/>
        </Card>
        <Card>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Body Measurements</h3>
          <Input label="Waist circumference (cm)" type="number" value={form.waist||''} onChange={e=>setForm(f=>({...f,waist:e.target.value}))} placeholder="70" min="40" max="180"/>
          <Input label="Hip circumference (cm)" type="number" value={form.hip||''} onChange={e=>setForm(f=>({...f,hip:e.target.value}))} placeholder="95" min="50" max="200"/>
          {(bmi||whr)&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:6}}>
              {bmi&&<div style={{background:T.roseLight,borderRadius:12,padding:14,textAlign:'center'}}><div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:800,color:T.rose}}>{bmi}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>BMI</div><div style={{fontSize:11,color:T.rose,fontWeight:600,marginTop:2}}>{bmiCat(bmi)}</div></div>}
              {whr&&<div style={{background:T.purpleLight,borderRadius:12,padding:14,textAlign:'center'}}><div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:800,color:T.purple}}>{whr}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>WHR</div><div style={{fontSize:11,color:T.purple,fontWeight:600,marginTop:2}}>{whrCat(whr)}</div></div>}
            </div>
          )}
        </Card>
        <Card style={{gridColumn:'1/-1'}}>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Cycle Settings</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            <Input label="First day of last period" type="date" value={form.lastPeriod||''} onChange={e=>setForm(f=>({...f,lastPeriod:e.target.value}))}/>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Cycle Length: <strong style={{color:T.rose}}>{form.cycleLength||28} days</strong></label>
              <input type="range" min="21" max="40" value={form.cycleLength||28} onChange={e=>setForm(f=>({...f,cycleLength:e.target.value}))} style={{width:'100%',accentColor:T.rose}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:T.inkLight}}><span>21 days</span><span>40 days</span></div>
            </div>
          </div>
          {form.lastPeriod&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.inkLight,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Your cycle phases</div>
              <div style={{display:'flex',gap:0,borderRadius:10,overflow:'hidden',height:32}}>
                {phaseBar.map(p=>{const w=((p.e-p.s+1)/len)*100;const isCur=info.phase&&PHASE_META[info.phase].label===p.n;return(
                  <div key={p.n} style={{width:`${w}%`,background:isCur?p.c:p.c+'60',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'white',letterSpacing:'0.04em'}}>{p.n.slice(0,3).toUpperCase()}</div>
                );})}
              </div>
              {info.phase&&<p style={{fontSize:12,color:T.inkMid,marginTop:8}}>Today is <strong>cycle day {info.day}</strong> — you are in your <strong style={{color:PHASE_META[info.phase].color}}>{PHASE_META[info.phase].label} phase</strong>.</p>}
            </div>
          )}
        </Card>
      </div>
      <button onClick={save} style={{marginTop:20,width:'100%',padding:14,background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer'}}>{saved?'✓ Profile Saved!':'Save Profile'}</button>
    </div>
  );
}

      <div style={{maxWidth:600,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:14}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:T.rose,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'white',fontSize:14}}>🌸</span></div>
          <span style={{fontFamily:'Playfair Display,serif',fontSize:19,fontWeight:700,color:'white'}}>NariSync</span>
        </div>
        <p style={{fontSize:12,color:'rgba(255,255,255,0.4)',marginBottom:6}}>A free, elegant companion for your hormonal health journey.</p>
        <p style={{fontSize:11,color:'rgba(255,255,255,0.25)',margin:'0 0 18px'}}>Cycle tracking · AI nutrition · Ayurveda · Yoga · Wellness guidance</p>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:16}}>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.3)',margin:0}}>© 2026 NariSync — Developed by <span style={{color:'#F8E8DE',fontWeight:600}}>Ruchika Sukhwal</span></p>
          <p style={{fontSize:10,color:'rgba(255,255,255,0.18)',marginTop:6}}>For informational purposes only. Not a substitute for professional medical advice.</p>
        </div>
      </div>
    </footer>
  );
}

/* ---- ROOT APP ---- */
const DEFAULT={name:'',age:'',weight:'',height:'',waist:'',hip:'',lastPeriod:'',cycleLength:'28'};
function App(){
  const[page,setPage]=useLS('ns_page','home');
  const[profile,setProfile]=useLS('ns_profile',DEFAULT);
  const[logs,setLogs]=useLS('ns_logs',{});
  const pages={
    home:<HomePage profile={profile} logs={logs} setPage={setPage}/>,
    tracker:<TrackerPage profile={profile} logs={logs} setLogs={setLogs} setPage={setPage}/>,
    recipes:<RecipesPage profile={profile} logs={logs} setLogs={setLogs} setPage={setPage}/>,
    mealprep:<MealPrepPage profile={profile} logs={logs} setLogs={setLogs} setPage={setPage}/>,
    yoga:<YogaPage profile={profile} setPage={setPage}/>,
    ayurveda:<AyurvedaPage profile={profile} setPage={setPage}/>,
    disorders:<DisordersPage setPage={setPage}/>,
    settings:<SettingsPage profile={profile} setProfile={setProfile} setPage={setPage}/>,
  };
  return(
    <div>
      <Navbar page={page} setPage={setPage} profile={profile}/>
      <main style={{minHeight:'calc(100vh - 62px - 160px)'}}>{pages[page]||pages['home']}</main>
      <Footer/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
