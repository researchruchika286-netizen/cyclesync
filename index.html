<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NariSync — Menstrual Health Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:#FEFAF6;color:#1A0E14;-webkit-font-smoothing:antialiased}
::selection{background:#F8E8DE;color:#7C2D43}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:#E8D8D0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#7C2D43;cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input,select,textarea{font-family:'Inter',sans-serif}
button{font-family:'Inter',sans-serif;cursor:pointer}
iframe{display:block}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#E8D8D0;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;

/* ---- tokens ---- */
const T={rose:'#7C2D43',roseDark:'#5C1D30',roseMid:'#A8425A',rosePale:'#F8E8DE',roseLight:'#FDF5F2',cream:'#FEFAF6',gold:'#C98E4F',goldLight:'#F5E9D5',sage:'#8FA15C',sageLight:'#EFF5E4',purple:'#6E5A9C',purpleLight:'#F0EDF9',ink:'#1A0E14',inkMid:'#4A3040',inkLight:'#8A7080',border:'#E8D8D0',white:'#FFFFFF',shadow:'rgba(124,45,67,0.08)',shadowMd:'rgba(124,45,67,0.14)'};

/* ---- helpers ---- */
function todayISO(){return new Date().toISOString().slice(0,10)}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function daysBetween(d1,d2){return Math.floor((d2-d1)/86400000)}
function fmtDate(iso){return new Date(iso+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function calcBMI(w,h){const wn=parseFloat(w),hn=parseFloat(h);if(!wn||!hn)return null;return +((wn/((hn/100)**2)).toFixed(1))}
function bmiCat(b){if(!b)return'—';if(b<18.5)return'Underweight';if(b<25)return'Normal';if(b<30)return'Overweight';return'Obese'}
function calcWHR(w,h){const wn=parseFloat(w),hn=parseFloat(h);if(!wn||!hn)return null;return +((wn/hn).toFixed(2))}
function whrCat(r){if(!r)return'—';if(r<0.8)return'Low Risk';if(r<=0.85)return'Moderate Risk';return'High Risk'}

const PHASE_META={
  menstrual:{label:'Menstrual',tagline:'Rest & restore',color:'#A8425A'},
  follicular:{label:'Follicular',tagline:'Rise & build',color:'#C98E4F'},
  ovulatory:{label:'Ovulatory',tagline:'Peak energy',color:'#8FA15C'},
  luteal:{label:'Luteal',tagline:'Slow & ground',color:'#6E5A9C'},
};

function phaseBounds(len){const l=len||28,ov=Math.round(l/2),me=Math.min(7,Math.max(3,Math.round(l*.18))),fe=Math.max(me+1,ov-2),oe=Math.min(l-1,ov+2);return{len:l,me,fe,oe}}
function phaseForDay(day,len){const{me,fe,oe}=phaseBounds(len);if(day<=me)return'menstrual';if(day<=fe)return'follicular';if(day<=oe)return'ovulatory';return'luteal'}
function getCycleInfo(last,len,dateISO){if(!last)return{day:null,phase:null};const l=len||28,diff=daysBetween(new Date(last+'T00:00:00'),new Date((dateISO||todayISO())+'T00:00:00')),day=((diff%l)+l)%l+1,phase=phaseForDay(day,l);return{day,phase,...phaseBounds(l)}}

/* ---- local storage ---- */
function useLS(key,init){
  const[state,set]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init}catch{return init}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(state))}catch{}},[key,state]);
  return[state,set];
}

/* ---- shared UI ---- */
const Card=({children,style={}})=>(
  <div style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:'24px 28px',boxShadow:`0 2px 14px ${T.shadow}`,...style}}>{children}</div>
);
const Badge=({label,color=T.rose,bg=T.rosePale})=>(
  <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color,background:bg}}>{label}</span>
);
const Btn=({children,onClick,style={},variant='primary',disabled=false})=>{
  const base={padding:'12px 24px',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:disabled?'default':'pointer',transition:'all 0.2s',...style};
  const styles={primary:{...base,background:T.rose,color:T.white},outline:{...base,background:'none',border:`1.5px solid ${T.border}`,color:T.inkMid},sage:{...base,background:T.sageLight,color:T.sage,border:`1px solid ${T.sage}40`}};
  return<button onClick={onClick} disabled={disabled} style={styles[variant]||base}>{children}</button>;
};
const Input=({label,value,onChange,type='text',placeholder,min,max})=>(
  <div style={{marginBottom:20}}>
    <label style={{display:'block',fontSize:12,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>{label}</label>
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} max={max}
      style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${T.border}`,borderRadius:10,fontSize:15,color:T.ink,background:T.cream,outline:'none',boxSizing:'border-box'}}
      onFocus={e=>e.target.style.borderColor=T.rose} onBlur={e=>e.target.style.borderColor=T.border}/>
  </div>
);
const BackBtn=({onClick})=>(
  <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:6,background:'none',border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 16px',cursor:'pointer',color:T.inkMid,fontSize:13,fontWeight:500,marginBottom:28}}>← Back</button>
);
const SectionHead=({title,subtitle,accent=T.rose})=>(
  <div style={{marginBottom:32}}>
    <div style={{width:36,height:3,background:accent,borderRadius:2,marginBottom:12}}/>
    <h2 style={{fontFamily:'Playfair Display,serif',fontSize:30,fontWeight:700,color:T.ink,margin:0}}>{title}</h2>
    {subtitle&&<p style={{color:T.inkLight,marginTop:6,fontSize:15,margin:'6px 0 0'}}>{subtitle}</p>}
  </div>
);

/* ---- NAV ---- */
const NAV=[{k:'home',l:'Home',i:'🏠'},{k:'tracker',l:'Tracker',i:'📅'},{k:'recipes',l:'Recipes',i:'🥗'},{k:'mealprep',l:'Meal Plan',i:'📋'},{k:'yoga',l:'Yoga',i:'🧘'},{k:'ayurveda',l:'Ayurveda',i:'🌿'},{k:'disorders',l:'Wellness',i:'💙'}];

function Navbar({page,setPage,profile}){
  const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength);
  const[open,setOpen]=useState(false);
  return(
    <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(254,250,246,0.95)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${T.border}`,padding:'0 16px'}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',height:62,gap:8}}>
        <button onClick={()=>setPage('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:8,marginRight:16,flexShrink:0}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:T.rose,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'white',fontSize:16}}>🌸</span>
          </div>
          <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:18,color:T.rose}}>NariSync</span>
        </button>
        <div style={{display:'flex',gap:2,flex:1,overflowX:'auto',paddingBottom:2}}>
          {NAV.map(n=>(
            <button key={n.k} onClick={()=>setPage(n.k)} style={{background:page===n.k?T.rosePale:'none',border:page===n.k?`1px solid ${T.border}`:'1px solid transparent',borderRadius:10,padding:'6px 12px',cursor:'pointer',color:page===n.k?T.rose:T.inkMid,fontSize:12,fontWeight:page===n.k?600:500,whiteSpace:'nowrap'}}>
              {n.i} {n.l}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {phase&&<div style={{background:PHASE_META[phase].color+'18',border:`1px solid ${PHASE_META[phase].color}40`,borderRadius:20,padding:'4px 10px',color:PHASE_META[phase].color,fontSize:11,fontWeight:600}}>{PHASE_META[phase].label}</div>}
          <button onClick={()=>setPage('settings')} style={{width:34,height:34,borderRadius:'50%',background:T.border,border:'none',cursor:'pointer',fontSize:15}}>⚙️</button>
        </div>
      </div>
    </nav>
  );
}

/* ---- HOME ---- */
function HomePage({profile,logs,setPage}){
  const today=todayISO();
  const{day,phase,len}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,today);
  const todayLog=logs[today]||{};
  const bmi=calcBMI(profile.weight,profile.height);
  const whr=calcWHR(profile.waist,profile.hip);
  const phaseGuide={
    menstrual:{body:'Hormones at lowest. Rest is productive.',food:'Iron-rich warm foods — dal, soups, khichdi.',move:'Restorative yoga, gentle walks.',mind:'Journalling & intention setting.'},
    follicular:{body:'Oestrogen rises. Energy and clarity build.',food:'Light protein — quinoa, yogurt, sprouts.',move:'Strength training, new classes.',mind:'Planning and starting new projects.'},
    ovulatory:{body:'Peak oestrogen. Highest energy & confidence.',food:'Anti-inflammatory — salmon, leafy greens.',move:'HIIT, dancing, heavy lifting.',mind:'Networking, presenting, collaborating.'},
    luteal:{body:'Progesterone rises. Body slows naturally.',food:'Complex carbs & magnesium — sweet potato, dark chocolate.',move:'Pilates, moderate yoga, walks.',mind:'Completing tasks, self-care rituals.'},
  };
  return(
    <div>
      <div style={{background:`linear-gradient(135deg,${T.rose} 0%,${T.roseDark} 60%,#3D0F20 100%)`,padding:'52px 24px 44px',textAlign:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,0.04)'}}/>
        <div style={{position:'relative',maxWidth:680,margin:'0 auto'}}>
          <p style={{color:'rgba(255,255,255,0.5)',fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',margin:'0 0 10px'}}>{new Date(today+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
          <h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(26px,5vw,42px)',fontWeight:800,color:'white',margin:'0 0 14px',lineHeight:1.15}}>{profile.name?`Good day, ${profile.name}`:'Welcome to NariSync'}</h1>
          {phase?(
            <div>
              <div style={{display:'inline-flex',alignItems:'center',gap:10,background:'rgba(255,255,255,0.12)',borderRadius:30,padding:'10px 24px',marginBottom:16}}>
                <span style={{fontFamily:'Playfair Display,serif',fontSize:18,color:'white',fontWeight:600}}>Cycle Day {day}</span>
                <span style={{color:'rgba(255,255,255,0.4)'}}>·</span>
                <span style={{color:T.rosePale,fontWeight:600,fontSize:14}}>{PHASE_META[phase].label} Phase</span>
              </div>
              <p style={{color:'rgba(255,255,255,0.7)',fontSize:15,margin:0}}>{PHASE_META[phase].tagline}</p>
            </div>
          ):(
            <div>
              <p style={{color:'rgba(255,255,255,0.7)',fontSize:15}}>Set up your profile to begin tracking.</p>
              <button onClick={()=>setPage('settings')} style={{background:'white',color:T.rose,border:'none',borderRadius:12,padding:'12px 28px',fontWeight:700,cursor:'pointer',fontSize:14}}>Set up Profile →</button>
            </div>
          )}
        </div>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 20px'}}>
        {(bmi||whr||day)&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:14,marginBottom:24}}>
            {day&&<Card style={{textAlign:'center',padding:18}}><div style={{fontFamily:'Playfair Display,serif',fontSize:34,fontWeight:800,color:T.rose}}>{day}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:4}}>Cycle Day</div><div style={{fontSize:11,color:T.rose,fontWeight:600,marginTop:2}}>of {len||28}</div></Card>}
            {bmi&&<Card style={{textAlign:'center',padding:18}}><div style={{fontFamily:'Playfair Display,serif',fontSize:34,fontWeight:800,color:T.sage}}>{bmi}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:4}}>BMI</div><div style={{fontSize:11,color:T.sage,fontWeight:600,marginTop:2}}>{bmiCat(bmi)}</div></Card>}
            {whr&&<Card style={{textAlign:'center',padding:18}}><div style={{fontFamily:'Playfair Display,serif',fontSize:34,fontWeight:800,color:T.purple}}>{whr}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:4}}>WHR</div><div style={{fontSize:11,color:T.purple,fontWeight:600,marginTop:2}}>{whrCat(whr)}</div></Card>}
            {todayLog.sleep&&<Card style={{textAlign:'center',padding:18}}><div style={{fontFamily:'Playfair Display,serif',fontSize:34,fontWeight:800,color:T.gold}}>{todayLog.sleep}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:4}}>Sleep hrs</div></Card>}
          </div>
        )}
        {!profile.lastPeriod&&(
          <Card style={{marginBottom:24,borderLeft:`4px solid ${T.gold}`,background:T.goldLight}}>
            <p style={{margin:0,fontSize:14,color:T.inkMid}}>👋 <strong>Get started:</strong> Add your last period date in <button onClick={()=>setPage('settings')} style={{background:'none',border:'none',color:T.rose,fontWeight:700,cursor:'pointer',textDecoration:'underline',fontSize:14}}>Settings</button> to unlock personalised recommendations across all modules.</p>
          </Card>
        )}
        <h3 style={{fontFamily:'Playfair Display,serif',fontSize:20,color:T.ink,marginBottom:16}}>Explore NariSync</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14,marginBottom:28}}>
          {[{k:'tracker',i:'📅',t:'Cycle Tracker',d:'Log period, sleep, mood & symptoms',c:T.rose},{k:'recipes',i:'🥗',t:'Recipe Generator',d:'Phase-personalised recipes by ingredient',c:T.gold},{k:'mealprep',i:'📋',t:'Meal Planner',d:'Weekly plan + shopping list',c:T.sage},{k:'yoga',i:'🧘',t:'Yoga & Movement',d:'Phase-specific routines with video guides',c:T.purple},{k:'ayurveda',i:'🌿',t:'Ayurveda',d:'Seed cycling, herbal teas & rituals',c:'#5A8A75'},{k:'disorders',i:'💙',t:'Wellness Guide',d:'PCOS, endometriosis, menopause & more',c:'#5572A8'}].map(m=>(
            <button key={m.k} onClick={()=>setPage(m.k)} style={{textAlign:'left',background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:18,cursor:'pointer',transition:'all 0.2s',boxShadow:`0 2px 10px ${T.shadow}`}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 6px 20px ${T.shadowMd}`}}
              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=`0 2px 10px ${T.shadow}`}}>
              <div style={{fontSize:26,marginBottom:8}}>{m.i}</div>
              <div style={{fontWeight:700,fontSize:14,color:T.ink,marginBottom:4}}>{m.t}</div>
              <div style={{fontSize:12,color:T.inkLight,lineHeight:1.4,marginBottom:10}}>{m.d}</div>
              <div style={{fontSize:12,fontWeight:600,color:m.c}}>Explore →</div>
            </button>
          ))}
        </div>
        {phase&&(
          <Card style={{background:PHASE_META[phase].color+'0C',border:`1px solid ${PHASE_META[phase].color}30`}}>
            <h3 style={{fontFamily:'Playfair Display,serif',fontSize:20,color:PHASE_META[phase].color,margin:'0 0 16px'}}>Your {PHASE_META[phase].label} Phase Guide</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
              {[['🫀','Body',phaseGuide[phase].body],['🥣','Nutrition',phaseGuide[phase].food],['🏃','Movement',phaseGuide[phase].move],['🧠','Mindset',phaseGuide[phase].mind]].map(([icon,title,text])=>(
                <div key={title} style={{background:'rgba(255,255,255,0.6)',borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
                  <div style={{fontWeight:700,color:PHASE_META[phase].color,marginBottom:6,fontSize:12,textTransform:'uppercase',letterSpacing:'0.08em'}}>{title}</div>
                  <div style={{fontSize:13,color:T.inkMid,lineHeight:1.5}}>{text}</div>
                </div>
              ))}
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

/* ---- TRACKER ---- */
const FLOWS=['None','Spotting','Light','Medium','Heavy','Very Heavy'];
const MOODS=['😊 Happy','😌 Calm','😐 Neutral','😔 Low','😤 Irritable','😢 Emotional','🥱 Exhausted','⚡ Energised'];
const SYMPTOMS=['Cramps','Headache','Bloating','Breast tenderness','Acne','Backache','Nausea','Insomnia','Cravings','Brain fog','Hot flushes','Pelvic pain'];

function TrackerPage({profile,logs,setLogs,setPage}){
  const today=todayISO();
  const[sel,setSel]=useState(today);
  const ex=logs[sel]||{};
  const[form,setForm]=useState({flow:ex.flow||'',sleep:ex.sleep||'',mood:ex.mood||'',symptoms:ex.symptoms||[],notes:ex.notes||''});
  const[saved,setSaved]=useState(false);
  useEffect(()=>{const e=logs[sel]||{};setForm({flow:e.flow||'',sleep:e.sleep||'',mood:e.mood||'',symptoms:e.symptoms||[],notes:e.notes||''});setSaved(false)},[sel]);
  const{day,phase,len}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,sel);
  const cycleLen=+profile.cycleLength||28;
  const calDays=Array.from({length:28},(_,i)=>{const iso=addDays(today,i-13);return{iso,...getCycleInfo(profile.lastPeriod,cycleLen,iso),log:logs[iso]}});
  function toggleSym(s){setForm(f=>({...f,symptoms:f.symptoms.includes(s)?f.symptoms.filter(x=>x!==s):[...f.symptoms,s]}))}
  function save(){setLogs(p=>({...p,[sel]:{...form,calories:p[sel]?.calories||0}}));setSaved(true);setTimeout(()=>setSaved(false),2000)}
  return(
    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Cycle Tracker" subtitle="Log your daily flow, mood, sleep and symptoms."/>
      <Card style={{marginBottom:24,overflowX:'auto'}}>
        <h3 style={{fontFamily:'Playfair Display,serif',fontSize:16,color:T.ink,margin:'0 0 14px'}}>28-Day Calendar</h3>
        <div style={{display:'flex',gap:5,paddingBottom:6}}>
          {calDays.map(cd=>{
            const isSel=cd.iso===sel,isToday=cd.iso===today;
            const pc=cd.phase?PHASE_META[cd.phase].color:T.border;
            const hasLog=cd.log&&(cd.log.flow||cd.log.sleep);
            return(
              <button key={cd.iso} onClick={()=>setSel(cd.iso)} style={{flex:'0 0 auto',width:42,minHeight:54,borderRadius:10,border:isSel?`2px solid ${T.rose}`:`1.5px solid ${pc}40`,background:isSel?T.rosePale:pc+'14',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                <div style={{fontSize:9,color:T.inkLight,fontWeight:600}}>{new Date(cd.iso+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'})}</div>
                <div style={{fontSize:14,fontWeight:isToday?800:500,color:isSel?T.rose:T.ink}}>{new Date(cd.iso+'T00:00:00').getDate()}</div>
                {hasLog&&<div style={{width:4,height:4,borderRadius:'50%',background:pc}}/>}
              </button>
            );
          })}
        </div>
        <div style={{display:'flex',gap:14,marginTop:10,flexWrap:'wrap'}}>
          {Object.entries(PHASE_META).map(([k,v])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:'50%',background:v.color}}/><span style={{fontSize:10,color:T.inkLight}}>{v.label}</span></div>
          ))}
        </div>
      </Card>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
            <div><div style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:700,color:T.ink}}>{fmtDate(sel)}</div>
            {phase&&<span style={{display:'inline-flex',alignItems:'center',gap:5,background:PHASE_META[phase].color+'18',border:`1.5px solid ${PHASE_META[phase].color}40`,borderRadius:20,padding:'4px 12px',color:PHASE_META[phase].color,fontWeight:700,fontSize:12,marginTop:4}}>{PHASE_META[phase].label}</span>}</div>
            {day&&<div style={{fontFamily:'Playfair Display,serif',fontSize:26,fontWeight:800,color:T.rose}}>Day {day}</div>}
          </div>
          <div style={{marginBottom:18}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Period Flow</label>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {FLOWS.map(f=><button key={f} onClick={()=>setForm(p=>({...p,flow:f}))} style={{padding:'5px 11px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',background:form.flow===f?T.rose:T.rosePale,color:form.flow===f?'white':T.rose,border:form.flow===f?`1.5px solid ${T.rose}`:`1.5px solid ${T.border}`}}>{f}</button>)}
            </div>
          </div>
          <Input label="Sleep (hours)" type="number" value={form.sleep} min="0" max="24" onChange={e=>setForm(f=>({...f,sleep:e.target.value}))} placeholder="e.g. 7.5"/>
          <div style={{marginBottom:18}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Mood</label>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {MOODS.map(m=><button key={m} onClick={()=>setForm(f=>({...f,mood:m}))} style={{padding:'5px 10px',borderRadius:20,fontSize:11,cursor:'pointer',background:form.mood===m?T.rose:T.roseLight,color:form.mood===m?'white':T.inkMid,border:form.mood===m?`1.5px solid ${T.rose}`:`1.5px solid ${T.border}`,fontWeight:form.mood===m?600:500}}>{m}</button>)}
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="How are you feeling?" rows={3} style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${T.border}`,borderRadius:10,fontSize:14,color:T.ink,background:T.cream,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
          </div>
          <button onClick={save} style={{width:'100%',padding:13,background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer'}}>{saved?'✓ Saved!':'Save Log'}</button>
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card>
            <h4 style={{fontFamily:'Playfair Display,serif',fontSize:15,color:T.ink,margin:'0 0 12px'}}>Symptoms</h4>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {SYMPTOMS.map(s=><button key={s} onClick={()=>toggleSym(s)} style={{padding:'6px 11px',borderRadius:20,fontSize:11,cursor:'pointer',background:form.symptoms.includes(s)?T.roseMid:T.roseLight,color:form.symptoms.includes(s)?'white':T.inkMid,border:form.symptoms.includes(s)?`1.5px solid ${T.roseMid}`:`1.5px solid ${T.border}`,fontWeight:500}}>{s}</button>)}
            </div>
          </Card>
          <Card>
            <h4 style={{fontFamily:'Playfair Display,serif',fontSize:15,color:T.ink,margin:'0 0 8px'}}>Today's Calories</h4>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:36,fontWeight:800,color:T.sage}}>{(logs[sel]?.calories||0).toLocaleString()}</div>
            <div style={{fontSize:11,color:T.inkLight,marginTop:4}}>kcal logged from recipes</div>
            <button onClick={()=>setPage('recipes')} style={{marginTop:12,background:T.sageLight,border:'none',borderRadius:10,padding:'8px 16px',color:T.sage,fontWeight:600,fontSize:12,cursor:'pointer'}}>Generate a Recipe →</button>
          </Card>
          <Card>
            <h4 style={{fontFamily:'Playfair Display,serif',fontSize:15,color:T.ink,margin:'0 0 12px'}}>Recent Logs</h4>
            {Object.entries(logs).filter(([d])=>d<=today).sort(([a],[b])=>b.localeCompare(a)).slice(0,5).map(([date,log])=>{
              const info=getCycleInfo(profile.lastPeriod,+profile.cycleLength,date);
              return(
                <button key={date} onClick={()=>setSel(date)} style={{width:'100%',textAlign:'left',background:date===sel?T.rosePale:'none',border:`1px solid ${T.border}`,borderRadius:10,padding:'9px 12px',cursor:'pointer',marginBottom:5}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{fontSize:12,fontWeight:600,color:T.ink}}>{fmtDate(date)}</div>
                    {info.phase&&<span style={{fontSize:10,fontWeight:600,color:PHASE_META[info.phase].color}}>{PHASE_META[info.phase].label}</span>}
                  </div>
                  <div style={{fontSize:11,color:T.inkLight,marginTop:3}}>{[log.flow&&`Flow: ${log.flow}`,log.sleep&&`Sleep: ${log.sleep}h`,log.mood].filter(Boolean).join(' · ')}</div>
                </button>
              );
            })}
            {Object.keys(logs).length===0&&<p style={{fontSize:12,color:T.inkLight,textAlign:'center'}}>No logs yet — start logging above.</p>}
          </Card>
        </div>
      </div>
    </div>
  );
}

function RecipesPage({profile,logs,setLogs,setPage}){
  const today=todayISO();
  const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,today);
  const bmi=calcBMI(profile.weight,profile.height);
  const whr=calcWHR(profile.waist,profile.hip);
  const[ing,setIng]=useState('');
  const[maxTime,setMaxTime]=useState('30');
  const[mealType,setMealType]=useState('any');
  const[results,setResults]=useState([]);
  const[generated,setGenerated]=useState(false);
  const[active,setActive]=useState(null);
  const[logged,setLogged]=useState({});
  function score(r){
    let s=0;
    const ui=ing.toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    if(ui.length){const m=r.ing.filter(ri=>ui.some(u=>ri.toLowerCase().includes(u)||u.includes(ri.split(' ')[0].toLowerCase()))).length;s+=m*10;}
    if(r.phase.includes(phase)||r.phase.includes('any'))s+=15;
    if(mealType!=='any'&&r.meal===mealType)s+=10;
    if(+maxTime&&r.time<=+maxTime)s+=8;
    if(bmi){const c=bmiCat(bmi);if(c==='Underweight'&&r.tags.includes('calorie-dense'))s+=5;if((c==='Overweight'||c==='Obese')&&r.tags.includes('high-fiber'))s+=5;}
    return s;
  }
  function generate(){const r=RECIPES.filter(r=>mealType==='any'||r.meal===mealType).filter(r=>!maxTime||r.time<=+maxTime).map(r=>({...r,score:score(r)})).sort((a,b)=>b.score-a.score).slice(0,3);setResults(r);setGenerated(true);setActive(null);}
  function logCal(r){setLogs(p=>{const dl=p[today]||{};return{...p,[today]:{...dl,calories:(dl.calories||0)+r.cal}}});setLogged(p=>({...p,[r.id]:true}));}
  return(
    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="AI Recipe Generator" subtitle="Enter ingredients and time, get phase-personalised recipe suggestions."/>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
        {phase&&<Badge label={`${PHASE_META[phase].label} Phase`} color={PHASE_META[phase].color} bg={PHASE_META[phase].color+'18'}/>}
        {bmi&&<Badge label={`BMI ${bmi} · ${bmiCat(bmi)}`} color={T.sage} bg={T.sageLight}/>}
        {whr&&<Badge label={`WHR ${whr} · ${whrCat(whr)}`} color={T.purple} bg={T.purpleLight}/>}
      </div>
      <Card style={{marginBottom:24}}>
        <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>What do you have?</h3>
        <Input label="Available ingredients (comma-separated)" value={ing} onChange={e=>setIng(e.target.value)} placeholder="e.g. spinach, lentils, ginger, rice"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <Input label="Max time (minutes)" type="number" value={maxTime} onChange={e=>setMaxTime(e.target.value)} placeholder="30" min="5" max="120"/>
          <div><label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Meal Type</label>
          <select value={mealType} onChange={e=>setMealType(e.target.value)} style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${T.border}`,borderRadius:10,fontSize:14,color:T.ink,background:T.cream,outline:'none'}}>
            {['any','breakfast','lunch','dinner','snack'].map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
          </select></div>
        </div>
        <button onClick={generate} style={{width:'100%',padding:13,background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',marginTop:4}}>✨ Generate Personalised Recipes</button>
      </Card>
      {generated&&results.length>0&&(
        <div>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:20,color:T.ink,marginBottom:16}}>Your personalised picks</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:18}}>
            {results.map(r=>(
              <Card key={r.id} style={{cursor:'pointer',border:active?.id===r.id?`2px solid ${T.rose}`:`1px solid ${T.border}`}} onClick={()=>setActive(active?.id===r.id?null:r)}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <Badge label={r.meal} color={T.gold} bg={T.goldLight}/>
                  {r.phase.includes(phase)&&<Badge label="Phase match ✓" color={T.sage} bg={T.sageLight}/>}
                </div>
                <h4 style={{fontFamily:'Playfair Display,serif',fontSize:16,color:T.ink,margin:'0 0 6px'}}>{r.name}</h4>
                <div style={{display:'flex',gap:14,marginBottom:8}}><span style={{fontSize:12,color:T.inkLight}}>⏱ {r.time} min</span><span style={{fontSize:12,color:T.sage,fontWeight:600}}>🔥 {r.cal} kcal</span></div>
                <p style={{fontSize:12,color:T.inkMid,lineHeight:1.5,margin:'0 0 10px'}}>{r.why}</p>
                <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>{r.tags.map(t=><Badge key={t} label={t} color={T.inkLight} bg={T.roseLight}/>)}</div>
                <button onClick={e=>{e.stopPropagation();logCal(r)}} disabled={logged[r.id]} style={{width:'100%',padding:8,background:logged[r.id]?T.sageLight:T.rosePale,color:logged[r.id]?T.sage:T.rose,border:'none',borderRadius:10,fontWeight:600,fontSize:12,cursor:logged[r.id]?'default':'pointer'}}>
                  {logged[r.id]?`✓ Logged ${r.cal} kcal`:`Log ${r.cal} kcal to today`}
                </button>
              </Card>
            ))}
          </div>
          {active&&(
            <Card style={{marginTop:24,borderLeft:`4px solid ${T.rose}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
                <div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:22,color:T.ink,margin:'0 0 6px'}}>{active.name}</h3><div style={{display:'flex',gap:14}}><span style={{fontSize:13,color:T.inkLight}}>⏱ {active.time} minutes</span><span style={{fontSize:13,color:T.sage,fontWeight:600}}>🔥 {active.cal} kcal</span></div></div>
                <button onClick={()=>setActive(null)} style={{background:T.roseLight,border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',color:T.rose,fontWeight:600,fontSize:12}}>Close</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:20}}>
                <div><h4 style={{color:T.rose,fontSize:12,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Ingredients</h4>
                <ul style={{margin:0,padding:0,listStyle:'none'}}>{active.ing.map(i=><li key={i} style={{padding:'7px 0',borderBottom:`1px solid ${T.border}`,fontSize:13,color:T.inkMid}}>· {i}</li>)}</ul></div>
                <div><h4 style={{color:T.rose,fontSize:12,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Steps</h4>
                <ol style={{margin:0,padding:0,listStyle:'none'}}>{active.steps.map((s,i)=><li key={i} style={{display:'flex',gap:12,marginBottom:12}}><div style={{flexShrink:0,width:24,height:24,borderRadius:'50%',background:T.rose,color:'white',fontWeight:700,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>{i+1}</div><p style={{fontSize:13,color:T.inkMid,lineHeight:1.6,margin:0}}>{s}</p></li>)}</ol></div>
              </div>
              <div style={{background:T.roseLight,borderRadius:10,padding:'12px 16px',marginTop:16}}><span style={{fontWeight:600,color:T.rose}}>Why this for you: </span><span style={{fontSize:13,color:T.inkMid}}>{active.why}</span></div>
            </Card>
          )}
        </div>
      )}
      {generated&&results.length===0&&<Card><p style={{textAlign:'center',color:T.inkLight}}>No recipes matched. Try extending the time or leaving ingredients blank.</p></Card>}
    </div>
  );
}

/* ---- MEAL PLANNER ---- */
function MealPrepPage({profile,logs,setLogs,setPage}){
  const today=todayISO();
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const[plan,setPlan]=useState(null);
  const[showShop,setShowShop]=useState(false);
  const[loggedMeals,setLoggedMeals]=useState({});
  function generate(){
    const p={};
    days.forEach((d,i)=>{
      const iso=addDays(today,i);
      const{phase}=getCycleInfo(profile.lastPeriod,+profile.cycleLength,iso);
      p[d]={date:iso,phase};
      ['breakfast','lunch','dinner','snack'].forEach(mt=>{
        const pool=RECIPES.filter(r=>r.meal===mt&&(r.phase.includes(phase)||r.phase.includes('any')||!phase));
        const fb=RECIPES.filter(r=>r.meal===mt);
        const src=pool.length>0?pool:fb;
        p[d][mt]=src[Math.floor(Math.random()*src.length)];
      });
    });
    setPlan(p);setShowShop(false);setLoggedMeals({});
  }
  function buildList(){
    const all={};
    Object.values(plan).forEach(d=>{
      ['breakfast','lunch','dinner','snack'].forEach(mt=>{
        if(d[mt]?.ing)d[mt].ing.forEach(i=>{const k=i.toLowerCase().trim();all[k]=(all[k]||0)+1;});
      });
    });
    const cats={'Grains & Pulses':[],'Vegetables':[],'Fruits':[],'Protein & Dairy':[],'Nuts & Seeds':[],'Spices & Condiments':[],'Other':[]};
    const gk=['rice','oat','quinoa','poha','flour','bread','lentil','dal','couscous','chickpea','bean'];
    const vk=['spinach','kale','broccoli','carrot','onion','garlic','ginger','beetroot','mushroom','zucchini','pepper','tomato','cucumber','potato','cauliflower','corn','pumpkin'];
    const fk=['banana','berries','lemon','lime','date','avocado'];
    const pk=['egg','tofu','paneer','yogurt','milk','cheese','salmon','feta','chocolate'];
    const nk=['almond','walnut','peanut','seed','flax','sesame','coconut','cashew'];
    const sk=['cinnamon','cumin','turmeric','garam','mustard','cardamom','paprika','salt','honey','oil','ghee','soy','tahini','chilli'];
    Object.keys(all).forEach(i=>{
      if(gk.some(k=>i.includes(k)))cats['Grains & Pulses'].push(i);
      else if(vk.some(k=>i.includes(k)))cats['Vegetables'].push(i);
      else if(fk.some(k=>i.includes(k)))cats['Fruits'].push(i);
      else if(pk.some(k=>i.includes(k)))cats['Protein & Dairy'].push(i);
      else if(nk.some(k=>i.includes(k)))cats['Nuts & Seeds'].push(i);
      else if(sk.some(k=>i.includes(k)))cats['Spices & Condiments'].push(i);
      else cats['Other'].push(i);
    });
    return cats;
  }
  function logMeal(dayKey,mt,recipe){
    setLoggedMeals(p=>({...p,[`${dayKey}-${mt}`]:true}));
    const iso=plan[dayKey].date;
    setLogs(p=>{const dl=p[iso]||{};return{...p,[iso]:{...dl,calories:(dl.calories||0)+recipe.cal}}});
  }
  const ShopItem=({item})=>{const[chk,setChk]=useState(false);return(<li onClick={()=>setChk(c=>!c)} style={{padding:'7px 0',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}><div style={{width:16,height:16,borderRadius:4,border:`2px solid ${chk?T.sage:T.border}`,background:chk?T.sage:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{chk&&<span style={{color:'white',fontSize:9,fontWeight:700}}>✓</span>}</div><span style={{fontSize:13,color:chk?T.inkLight:T.inkMid,textDecoration:chk?'line-through':'none',textTransform:'capitalize'}}>{item}</span></li>);};
  const list=plan&&showShop?buildList():null;
  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Weekly Meal Planner" subtitle="A phase-aligned meal plan for the next 7 days with a smart shopping list." accent={T.sage}/>
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
        <button onClick={generate} style={{padding:'12px 24px',background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer'}}>✨ Generate This Week's Plan</button>

                    return(
                      <div key={mt} style={{background:isL?T.sageLight:T.cream,borderRadius:10,padding:'11px 13px',border:`1px solid ${isL?T.sage+'40':T.border}`}}>

                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:8,fontSize:11,color:T.inkLight}}>Total: <strong style={{color:T.ink}}>{(['breakfast','lunch','dinner','snack'].reduce((a,mt)=>a+(d[mt]?.cal||0),0)).toLocaleString()} kcal</strong></div>
              </Card>
            );
          })}
        </div>
      )}
      {list&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:18}}>

          ))}
        </div>
      )}
      {!plan&&<Card style={{textAlign:'center',padding:'44px 24px'}}><div style={{fontSize:44,marginBottom:12}}>📋</div><p style={{fontSize:15,color:T.inkLight}}>Generate your personalised weekly plan — meals are chosen to align with your cycle phase each day.</p></Card>}
    </div>
  );
}

                <h4 style={{fontFamily:'Playfair Display,serif',fontSize:16,color:T.ink,margin:'0 0 12px'}}>{s.name}</h4>
                <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:T.sage,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>Seeds to use daily</div>{s.seeds.map(sd=><div key={sd} style={{padding:'7px 10px',background:T.sageLight,borderRadius:8,marginBottom:5,fontSize:13,fontWeight:600,color:'#3A6B50'}}>🌿 {sd}</div>)}</div>
                <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:T.sage,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Why these seeds?</div><p style={{fontSize:12,color:T.inkMid,lineHeight:1.6,margin:0}}>{s.why}</p></div>
                <div style={{background:'#EEF8F2',borderRadius:10,padding:'10px 12px'}}><div style={{fontSize:10,fontWeight:700,color:T.sage,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>How to take</div><p style={{fontSize:12,color:T.inkMid,margin:0,lineHeight:1.5}}>{s.how}</p></div>
              </Card>
            );})}
          </div>
        </div>
      )}
      {tab==='rituals'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {RITUALS.map((r,i)=>{const isOpen=openR===i;return(
            <Card key={r.name}>
              <div style={{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}} onClick={()=>setOpenR(isOpen?null:i)}>
                <h4 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:0}}>{r.name}</h4>
                <span style={{color:T.sage,fontSize:16}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
                <p style={{fontSize:13,color:T.inkMid,lineHeight:1.65,margin:'0 0 12px'}}>{r.desc}</p>
                <div style={{background:T.sageLight,borderRadius:10,padding:'10px 14px'}}><span style={{fontWeight:700,color:T.sage,fontSize:13}}>Benefits: </span><span style={{fontSize:13,color:T.inkMid}}>{r.ben}</span></div>
              </div>}
            </Card>
          );})}
        </div>
      )}
    </div>
  );
}

const DISORDERS=[
  {id:'pcos',name:'PCOS',full:'Polycystic Ovary Syndrome',emoji:'🔵',prev:'Affects ~1 in 10 women of reproductive age',syms:['Irregular or absent periods','Excess androgen — acne, facial hair, hair thinning','Weight gain around the waist','Difficulty conceiving','Multiple small cysts on ovaries','Fatigue and mood changes'],causes:'Linked to insulin resistance, elevated androgens and inflammation. Has a genetic component but strongly influenced by lifestyle.',nutrition:['Follow a low-glycaemic diet: whole grains, legumes, non-starchy vegetables.','Reduce refined sugars and white flour.','Add anti-inflammatory foods: turmeric, omega-3 fish, berries, leafy greens.','Spearmint tea (2 cups/day) — clinically shown to lower androgens.','Myo-inositol (2–4 g/day) — well-researched for insulin sensitivity in PCOS.'],exercise:'150 min/week moderate aerobic activity. Add 2 strength sessions. Exercise is as effective as medication for insulin sensitivity.',ayurveda:'Spearmint tea, Shatavari, Triphala and Ashwagandha are primary supports. Kapha-balancing diet (warm, light, spiced foods). Yoga Nidra and Pranayama reduce cortisol.',doctor:'Absent periods 3+ months, difficulty conceiving after 6–12 months, severe acne or hair loss.'},
  {id:'endo',name:'Endometriosis',full:'Endometriosis',emoji:'🔴',prev:'Affects ~1 in 10 women — average 7–10 years to diagnosis',syms:['Severe menstrual cramps','Chronic pelvic pain outside of period','Pain during or after intercourse','Pain with bowel movements or urination','Heavy or irregular periods','Fatigue','Infertility in some cases'],causes:'Endometrial-like tissue grows outside the uterus, causing inflammation, adhesions and scar tissue.',nutrition:['Anti-inflammatory diet: omega-3s, turmeric, ginger, leafy greens.','Reduce red meat, trans fats, alcohol and caffeine.','Increase dietary fibre to support oestrogen excretion.','Magnesium glycinate (200–400 mg/day) may help with pain — discuss with doctor.'],exercise:'Gentle, anti-inflammatory movement: yoga, swimming, walking. Avoid high-impact during a flare. Pelvic floor physiotherapy can be transformative.',ayurveda:'Yoni steam after menstruation, Triphala, Shatavari and warm castor oil packs on the lower abdomen (not during period).',doctor:'Any pelvic pain disrupting your life — especially pain during sex. Requires specialist referral for definitive diagnosis.'},
  {id:'pmdd',name:'PMDD',full:'Premenstrual Dysphoric Disorder',emoji:'🟣',prev:'Affects ~3–8% of menstruating women — often misdiagnosed',syms:['Severe mood swings or irritability 1–2 weeks before period','Marked depression, hopelessness or anxiety','Difficulty concentrating','Fatigue and low energy','Changes in appetite or sleep','Bloating, breast tenderness, headaches','Symptoms resolve within days of period starting'],causes:'Abnormal neurological sensitivity to normal luteal-phase hormone fluctuations, particularly affecting serotonin systems.',nutrition:['Calcium-rich foods: dairy, fortified plant milk, leafy greens.','Vitamin B6 (50–100 mg/day) supports serotonin.','Magnesium (300–400 mg/day) in the luteal phase.','Reduce caffeine, alcohol and refined sugar 2 weeks before period.'],exercise:'Aerobic exercise 3–5 times weekly is as effective as antidepressants for mild-moderate PMDD. Walking, yoga and dancing are excellent.',ayurveda:'Ashwagandha, Brahmi, Shatavari and Yoga Nidra are key. Daily Abhyanga (self-massage) is deeply calming.',doctor:'PMDD is a diagnosable condition. Seek help if symptoms significantly disrupt work or relationships.'},
  {id:'menopause',name:'Menopause',full:'Menopause & Post-Menopause',emoji:'🌸',prev:'Natural end of menstruation, typically 45–55. Perimenopause may start in late 30s.',syms:['Hot flushes and night sweats','Irregular periods (perimenopause)','Vaginal dryness','Sleep disturbances','Mood changes, anxiety or brain fog','Reduced libido','Joint pain and muscle aches','Increased cardiovascular and bone-loss risk'],causes:'Natural decline of ovarian oestrogen and progesterone production.',nutrition:['Calcium 1,200 mg/day + Vitamin D 1,000–2,000 IU/day for bone density.','Phytoestrogen-rich foods: soy, flaxseed, lentils — may ease hot flushes.','Increase omega-3s for cardiovascular and joint health.','Protein 1.2–1.6 g/kg body weight to preserve muscle mass.'],exercise:'Weight-bearing exercise (walking, weight training) is the most evidence-based strategy to maintain bone density. Aim for 2 strength sessions weekly.',ayurveda:'Shatavari (2 g/day in warm milk) is the premier herb for menopause. Ashwagandha for energy. Cooling practices (Sheetali pranayama) help manage hot flushes.',doctor:'Early menopause under 45, severe hot flushes, new-onset depression, bone density concerns, or any postmenopausal bleeding.'},
];

    <div style={{maxWidth:960,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>{if(sel){setSel(null)}else{setPage('home')}}}/>
      <SectionHead title="Wellness & Disorders Guide" subtitle="Evidence-based guidance on common menstrual health conditions." accent={T.purple}/>
      {!sel?(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:18}}>
          {DISORDERS.map(d=>(
            <button key={d.id} onClick={()=>{setSel(d);setSecTab('syms')}} style={{textAlign:'left',background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:22,cursor:'pointer',transition:'all 0.2s',boxShadow:`0 2px 10px ${T.shadow}`}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 6px 20px ${T.shadowMd}`}}

              <h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 4px'}}>{d.full}</h3>
              <div style={{fontSize:11,color:T.inkLight,marginBottom:10,fontStyle:'italic'}}>{d.prev}</div>
              <div style={{fontSize:12,color:T.inkMid,lineHeight:1.5,marginBottom:12}}>{d.syms.slice(0,3).map(s=>`· ${s}`).join('\n')}</div>

        <div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>

            <div><h2 style={{fontFamily:'Playfair Display,serif',fontSize:26,color:T.ink,margin:0}}>{sel.full}</h2><p style={{margin:'4px 0 0',fontSize:12,color:T.inkLight,fontStyle:'italic'}}>{sel.prev}</p></div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:22,flexWrap:'wrap',borderBottom:`1px solid ${T.border}`,paddingBottom:14}}>
            {sections.map(s=><button key={s.k} onClick={()=>setSecTab(s.k)} style={{padding:'7px 16px',borderRadius:10,fontWeight:600,fontSize:12,background:secTab===s.k?T.purple:'none',color:secTab===s.k?'white':T.inkLight,border:`1.5px solid ${secTab===s.k?T.purple:T.border}`,cursor:'pointer'}}>{s.l}</button>)}
          </div>
          <Card style={{borderLeft:`4px solid ${T.purple}`}}>
            {secTab==='syms'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 14px'}}>Signs & Symptoms</h3><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10}}>{sel.syms.map(s=><div key={s} style={{display:'flex',gap:8,padding:'10px 12px',background:T.purpleLight,borderRadius:10}}><span style={{color:T.purple,flexShrink:0}}>◆</span><span style={{fontSize:13,color:T.inkMid}}>{s}</span></div>)}</div></div>}
            {secTab==='causes'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>Causes</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.causes}</p></div>}
            {secTab==='nutrition'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 14px'}}>Nutrition Guidance</h3>{sel.nutrition.map((n,i)=><div key={i} style={{display:'flex',gap:10,padding:'11px 14px',background:T.roseLight,borderRadius:10,marginBottom:8}}><span style={{color:T.rose,fontWeight:800,flexShrink:0}}>{i+1}.</span><span style={{fontSize:13,color:T.inkMid,lineHeight:1.55}}>{n}</span></div>)}</div>}

            {secTab==='ayurveda'&&<div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:19,color:T.ink,margin:'0 0 12px'}}>Ayurvedic Approach</h3><p style={{fontSize:14,color:T.inkMid,lineHeight:1.7,margin:0}}>{sel.ayurveda}</p></div>}

    </div>
  );
}

/* ---- SETTINGS ---- */
function SettingsPage({profile,setProfile,setPage}){
  const[form,setForm]=useState({...profile});
  const[saved,setSaved]=useState(false);
  const bmi=calcBMI(form.weight,form.height);
  const whr=calcWHR(form.waist,form.hip);
  function save(){setProfile({...form});setSaved(true);setTimeout(()=>setSaved(false),2200);}
  const info=getCycleInfo(form.lastPeriod,+form.cycleLength,todayISO());
  const len=+form.cycleLength||28;
  const{me,fe,oe}=info.len?{me:info.me,fe:info.fe,oe:info.oe}:phaseBounds(len);
  const phaseBar=[{n:'Menstrual',s:1,e:me,c:T.rose},{n:'Follicular',s:me+1,e:fe,c:T.gold},{n:'Ovulatory',s:fe+1,e:oe,c:T.sage},{n:'Luteal',s:oe+1,e:len,c:T.purple}];
  return(
    <div style={{maxWidth:840,margin:'0 auto',padding:'32px 20px'}}>
      <BackBtn onClick={()=>setPage('home')}/>
      <SectionHead title="Your Profile" subtitle="Your health data powers personalised recommendations across all modules."/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <Card>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Basic Info</h3>
          <Input label="Your name" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Priya"/>
          <Input label="Age" type="number" value={form.age||''} onChange={e=>setForm(f=>({...f,age:e.target.value}))} placeholder="25" min="10" max="80"/>
          <Input label="Weight (kg)" type="number" value={form.weight||''} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="60" min="30" max="200"/>
          <Input label="Height (cm)" type="number" value={form.height||''} onChange={e=>setForm(f=>({...f,height:e.target.value}))} placeholder="165" min="100" max="230"/>
        </Card>
        <Card>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Body Measurements</h3>
          <Input label="Waist circumference (cm)" type="number" value={form.waist||''} onChange={e=>setForm(f=>({...f,waist:e.target.value}))} placeholder="70" min="40" max="180"/>
          <Input label="Hip circumference (cm)" type="number" value={form.hip||''} onChange={e=>setForm(f=>({...f,hip:e.target.value}))} placeholder="95" min="50" max="200"/>
          {(bmi||whr)&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:6}}>
              {bmi&&<div style={{background:T.roseLight,borderRadius:12,padding:14,textAlign:'center'}}><div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:800,color:T.rose}}>{bmi}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>BMI</div><div style={{fontSize:11,color:T.rose,fontWeight:600,marginTop:2}}>{bmiCat(bmi)}</div></div>}
              {whr&&<div style={{background:T.purpleLight,borderRadius:12,padding:14,textAlign:'center'}}><div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:800,color:T.purple}}>{whr}</div><div style={{fontSize:10,color:T.inkLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>WHR</div><div style={{fontSize:11,color:T.purple,fontWeight:600,marginTop:2}}>{whrCat(whr)}</div></div>}
            </div>
          )}
        </Card>
        <Card style={{gridColumn:'1/-1'}}>
          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:17,color:T.ink,margin:'0 0 18px'}}>Cycle Settings</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            <Input label="First day of last period" type="date" value={form.lastPeriod||''} onChange={e=>setForm(f=>({...f,lastPeriod:e.target.value}))}/>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:T.inkLight,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Cycle Length: <strong style={{color:T.rose}}>{form.cycleLength||28} days</strong></label>
              <input type="range" min="21" max="40" value={form.cycleLength||28} onChange={e=>setForm(f=>({...f,cycleLength:e.target.value}))} style={{width:'100%',accentColor:T.rose}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:T.inkLight}}><span>21 days</span><span>40 days</span></div>
            </div>
          </div>
          {form.lastPeriod&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.inkLight,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Your cycle phases</div>
              <div style={{display:'flex',gap:0,borderRadius:10,overflow:'hidden',height:32}}>
                {phaseBar.map(p=>{const w=((p.e-p.s+1)/len)*100;const isCur=info.phase&&PHASE_META[info.phase].label===p.n;return(
                  <div key={p.n} style={{width:`${w}%`,background:isCur?p.c:p.c+'60',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'white',letterSpacing:'0.04em'}}>{p.n.slice(0,3).toUpperCase()}</div>
                );})}
              </div>
              {info.phase&&<p style={{fontSize:12,color:T.inkMid,marginTop:8}}>Today is <strong>cycle day {info.day}</strong> — you are in your <strong style={{color:PHASE_META[info.phase].color}}>{PHASE_META[info.phase].label} phase</strong>.</p>}
            </div>
          )}
        </Card>
      </div>
      <button onClick={save} style={{marginTop:20,width:'100%',padding:14,background:T.rose,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer'}}>{saved?'✓ Profile Saved!':'Save Profile'}</button>
    </div>
  );
}

/* ---- ROOT APP ---- */
const DEFAULT={name:'',age:'',weight:'',height:'',waist:'',hip:'',lastPeriod:'',cycleLength:'28'};

    mealprep:<MealPrepPage profile={profile} logs={logs} setLogs={setLogs} setPage={setPage}/>,

    ayurveda:<AyurvedaPage profile={profile} setPage={setPage}/>,

          <div style={{fontSize:18,marginBottom:5}}>👋</div>
          <div style={{fontSize:13,fontWeight:600,color:T.ink,marginBottom:4}}>Set up your profile</div>
          <div style={{fontSize:11,color:T.inkLight,marginBottom:10}}>Add your cycle date to unlock personalised recommendations.</div>
          <button onClick={()=>setPage('settings')} style={{width:'100%',padding:8,background:T.rose,color:'white',border:'none',borderRadius:8,fontWeight:600,fontSize:12,cursor:'pointer'}}>Set up Profile</button>
        </div>
      )}
      <Navbar page={page} setPage={setPage} profile={profile}/>
      <main style={{minHeight:'calc(100vh - 62px - 160px)'}}>{pages[page]||pages['home']}</main>

}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
